name: Score Forecasts

on:
  # Run after target data is updated
  workflow_run:
    workflows: ["Update Target Data"]
    types: [completed]
  workflow_dispatch:

jobs:
  score:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' || github.event_name == 'workflow_dispatch' }}
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install pandas numpy

      - name: Score all forecasts
        run: python src/scoring/score_forecasts.py

      - name: Check for changes
        id: check
        run: |
          if git diff --quiet model-evaluation/; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Commit and push scores
        if: steps.check.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add model-evaluation/
          git commit -m "Update forecast scores $(date +%Y-%m-%d)"
          git push

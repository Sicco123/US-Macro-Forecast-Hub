name: Update Target Data

on:
  schedule:
    # Run on the 8th of each month at 10:00 UTC
    # FRED-MD is typically updated in the first week of each month
    - cron: '0 10 8 * *'
  workflow_dispatch:

jobs:
  update-data:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install pandas fredapi python-dotenv

      - name: Fetch latest FRED-MD data
        run: python target-data/fetch_fred_md.py --output-dir target-data
        env:
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}

      - name: Check for changes
        id: check
        run: |
          if git diff --quiet target-data/latest-target_values.csv; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Commit and push updates
        if: steps.check.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add target-data/
          git commit -m "Update target data from FRED-MD $(date +%Y-%m-%d)"
          git push

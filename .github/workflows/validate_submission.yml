name: Validate Forecast Submission

on:
  pull_request:
    branches: [main]
    paths:
      - 'model-output/**'
      - 'model-metadata/**'

jobs:
  validate:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install pandas pyyaml jsonschema

      - name: Get changed files
        id: changed
        run: |
          echo "files<<EOF" >> $GITHUB_OUTPUT
          git diff --name-only ${{ github.event.pull_request.base.sha }} ${{ github.sha }} >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Validate submission paths
        run: python src/validation/check_submission_paths.py
        env:
          CHANGED_FILES: ${{ steps.changed.outputs.files }}

      - name: Validate forecast file format
        run: python src/validation/validate_forecast.py
        env:
          CHANGED_FILES: ${{ steps.changed.outputs.files }}

      - name: Validate model metadata
        run: python src/validation/validate_metadata.py
        env:
          CHANGED_FILES: ${{ steps.changed.outputs.files }}

      - name: Post validation result
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const botComment = comments.find(c =>
              c.user.type === 'Bot' && c.body.includes('Submission Validation')
            );
            const status = '${{ job.status }}' === 'success' ? '✅' : '❌';
            const body = `### ${status} Submission Validation\n\nValidation **${{ job.status }}**.`;
            if (botComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: botComment.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }
